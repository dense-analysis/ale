---
name: CI
on:  # yamllint disable-line rule:truthy
  push:
    branches: [ master ]  # yamllint disable-line rule:brackets
    tags:
      - v[0-9]+.[0-9]+.x
      - v[0-9]+.[0-9]+.[0-9]+
  pull_request:
    branches: [ master ]  # yamllint disable-line rule:brackets

jobs:
  build_image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build docker run image
        shell: bash
        env:
          DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USER }}
          DOCKER_HUB_PASS: ${{ secrets.DOCKER_HUB_PASS }}
        run: ./run-tests --build-image
  test_ale:
    needs: build_image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        vim-version:
          - '--vim-90-only'
          - '--vim-92-only'
          - '--neovim-010-only'
          - '--neovim-012-only'
          - '--lua-only'
          - '--linters-only'
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: ./run-tests -v ${{ matrix.vim-version }}
  test_ale_windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - editor: vim
            neovim: false
            version: v9.0.2189
            headless: ''
          - editor: vim
            neovim: false
            version: v9.2.0329
            headless: ''
          - editor: neovim
            neovim: true
            version: v0.10.4
            headless: '--headless'
          - editor: neovim
            neovim: true
            version: v0.12.1
            headless: '--headless'
    steps:
      - uses: actions/checkout@v4
      - name: Setup ${{ matrix.editor }} ${{ matrix.version }}
        uses: rhysd/action-setup-vim@v1
        id: editor
        with:
          neovim: ${{ matrix.neovim }}
          version: ${{ matrix.version }}
      - name: Clone Vader
        shell: cmd
        run: |
          git clone https://github.com/junegunn/vader.vim C:\vader
          git -C C:\vader checkout -qf c6243dd81c98350df4dec608fa972df98fa2a3af
      - name: Run tests
        shell: cmd
        env:
          VIM_EXE: ${{ steps.editor.outputs.executable }}
          VIM_HEADLESS: ${{ matrix.headless }}
        run: |
          set TMP=%CD:~0,2%\tmp
          set TEMP=%CD:~0,2%\tmp
          if not exist "%CD:~0,2%\tmp" mkdir "%CD:~0,2%\tmp"
          run-tests.bat
